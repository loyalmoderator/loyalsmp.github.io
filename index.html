<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Loyal SMP Socials</title>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

          <style>
              * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

                  body {
                        background: #000;
                              color: #fff;
                                    display: flex;
                                          justify-content: center;
                                                align-items: center;
                                                      height: 100vh;
                                                          }

                                                              .container {
                                                                    background: #fff;
                                                                          color: #000;
                                                                                padding: 40px;
                                                                                      border-radius: 20px;
                                                                                            width: 90%;
                                                                                                  max-width: 450px;
                                                                                                        text-align: center;
                                                                                                              box-shadow: 0 10px 30px rgba(0,0,0,0.5);
                                                                                                                  }

                                                                                                                      .top-image {
                                                                                                                            width: 120px;
                                                                                                                                  height: 120px;
                                                                                                                                        object-fit: cover;
                                                                                                                                              border-radius: 15px;
                                                                                                                                                    margin-bottom: 15px;
                                                                                                                                                        }

                                                                                                                                                            .socials-row img {
                                                                                                                                                                  width: 45px;
                                                                                                                                                                        margin: 10px;
                                                                                                                                                                              cursor: pointer;
                                                                                                                                                                                    transition: transform 0.2s ease;
                                                                                                                                                                                        }

                                                                                                                                                                                            .socials-row img:hover {
                                                                                                                                                                                                  transform: scale(1.1);
                                                                                                                                                                                                      }

                                                                                                                                                                                                          h1 { font-size: 28px; margin-bottom: 15px; color: #000; }
                                                                                                                                                                                                              p { font-size: 14px; color: #555; margin-bottom: 20px; }

                                                                                                                                                                                                                  .note {
                                                                                                                                                                                                                        margin-top: 20px;
                                                                                                                                                                                                                              font-size: 12px;
                                                                                                                                                                                                                                    color: #555;
                                                                                                                                                                                                                                        }

                                                                                                                                                                                                                                            @media (max-width: 500px) {
                                                                                                                                                                                                                                                  .container { padding: 30px; }
                                                                                                                                                                                                                                                        h1 { font-size: 24px; }
                                                                                                                                                                                                                                                              .top-image { width: 100px; height: 100px; }
                                                                                                                                                                                                                                                                  }
                                                                                                                                                                                                                                                                    </style>
                                                                                                                                                                                                                                                                    </head>

                                                                                                                                                                                                                                                                    <body>
                                                                                                                                                                                                                                                                      <div class="container">

                                                                                                                                                                                                                                                                          <!-- IMAGE -->
                                                                                                                                                                                                                                                                              <img src="Untitled design_20260322_143035_0000.png" alt="Banner" class="top-image">

                                                                                                                                                                                                                                                                                  <h1>Loyal SMP Socials</h1>
                                                                                                                                                                                                                                                                                      <p>Follow us on our socials!</p>

                                                                                                                                                                                                                                                                                          <!-- Socials -->
                                                                                                                                                                                                                                                                                              <div class="socials-row">

                                                                                                                                                                                                                                                                                                    <!-- DISCORD (official logo style) -->
                                                                                                                                                                                                                                                                                                          <a href="https://discord.gg/a8xMq2jxrW" target="_blank">
                                                                                                                                                                                                                                                                                                                  <img src="https://cdn-icons-png.flaticon.com/512/5968/5968756.png" alt="Discord">
                                                                                                                                                                                                                                                                                                                        </a>

                                                                                                                                                                                                                                                                                                                              <!-- YOUTUBE -->
                                                                                                                                                                                                                                                                                                                                    <a href="https://www.youtube.com/@TheLoyalSMP" target="_blank">
                                                                                                                                                                                                                                                                                                                                            <img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png" alt="YouTube">
                                                                                                                                                                                                                                                                                                                                                  </a>

                                                                                                                                                                                                                                                                                                                                                        <!-- TIKTOK -->
                                                                                                                                                                                                                                                                                                                                                              <a href="https://tiktok.com/@loyalsmp0" target="_blank">
                                                                                                                                                                                                                                                                                                                                                                      <img src="https://cdn-icons-png.flaticon.com/512/3046/3046126.png" alt="TikTok">
                                                                                                                                                                                                                                                                                                                                                                            </a>

                                                                                                                                                                                                                                                                                                                                                                                </div>

                                                                                                                                                                                                                                                                                                                                                                                    <div class="note">Join the community and stay updated!</div>

                                                                                                                                                                                                                                                                                                                                                                                      </div>
                                                                                                                                                                                                                                                                                                                                                                                      </body>
                                                                                                                                                                                                                                                                                                                                                                                      </html>
