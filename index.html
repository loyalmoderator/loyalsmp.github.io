<!DOCTYPE html>
<html>
<head>
  <title>Loyal SMP Supporter</title>

    <style>
        /* Body background and text */
            body {
                  margin: 0;
                        padding: 0;
                              font-family: 'Arial', sans-serif;
                                    background: linear-gradient(135deg, #000000, #1c1c1c);
                                          color: white;
                                                display: flex;
                                                      flex-direction: column;
                                                            align-items: center;
                                                                  justify-content: flex-start;
                                                                        min-height: 100vh;
                                                                            }

                                                                                /* Logo section */
                                                                                    .logo {
                                                                                          margin-top: 60px;
                                                                                                animation: fadeIn 1.5s ease-in-out;
                                                                                                    }

                                                                                                        .logo img {
                                                                                                              width: 180px;
                                                                                                                    border-radius: 20px;
                                                                                                                          box-shadow: 0 0 20px rgba(255,255,255,0.4);
                                                                                                                                transition: transform 0.3s ease;
                                                                                                                                    }

                                                                                                                                        .logo img:hover {
                                                                                                                                              transform: scale(1.05);
                                                                                                                                                  }

                                                                                                                                                      /* UI box */
                                                                                                                                                          .ui-box {
                                                                                                                                                                margin-top: 40px;
                                                                                                                                                                      padding: 30px 50px;
                                                                                                                                                                            border: 2px solid white;
                                                                                                                                                                                  border-radius: 15px;
                                                                                                                                                                                        background: rgba(255, 255, 255, 0.05);
                                                                                                                                                                                              box-shadow: 0 0 30px rgba(255,255,255,0.2);
                                                                                                                                                                                                    text-align: center;
                                                                                                                                                                                                          animation: fadeIn 2s ease-in-out;
                                                                                                                                                                                                              }

                                                                                                                                                                                                                  .ui-box h1 {
                                                                                                                                                                                                                        margin: 0 0 10px;
                                                                                                                                                                                                                              font-size: 2rem;
                                                                                                                                                                                                                                    letter-spacing: 1px;
                                                                                                                                                                                                                                        }

                                                                                                                                                                                                                                            .ui-box p {
                                                                                                                                                                                                                                                  margin: 0 0 20px;
                                                                                                                                                                                                                                                        font-size: 1.1rem;
                                                                                                                                                                                                                                                              color: #ccc;
                                                                                                                                                                                                                                                                  }

                                                                                                                                                                                                                                                                      /* Button style */
                                                                                                                                                                                                                                                                          a.button {
                                                                                                                                                                                                                                                                                color: white;
                                                                                                                                                                                                                                                                                      text-decoration: none;
                                                                                                                                                                                                                                                                                            border: 2px solid white;
                                                                                                                                                                                                                                                                                                  padding: 12px 30px;
                                                                                                                                                                                                                                                                                                        border-radius: 8px;
                                                                                                                                                                                                                                                                                                              display: inline-block;
                                                                                                                                                                                                                                                                                                                    transition: all 0.3s ease;
                                                                                                                                                                                                                                                                                                                          font-weight: bold;
                                                                                                                                                                                                                                                                                                                              }

                                                                                                                                                                                                                                                                                                                                  a.button:hover {
                                                                                                                                                                                                                                                                                                                                        background-color: white;
                                                                                                                                                                                                                                                                                                                                              color: black;
                                                                                                                                                                                                                                                                                                                                                    transform: scale(1.05);
                                                                                                                                                                                                                                                                                                                                                        }

                                                                                                                                                                                                                                                                                                                                                            /* Fade-in animation */
                                                                                                                                                                                                                                                                                                                                                                @keyframes fadeIn {
                                                                                                                                                                                                                                                                                                                                                                      from { opacity: 0; transform: translateY(20px); }
                                                                                                                                                                                                                                                                                                                                                                            to { opacity: 1; transform: translateY(0); }
                                                                                                                                                                                                                                                                                                                                                                                }

                                                                                                                                                                                                                                                                                                                                                                                    /* Responsive for mobile */
                                                                                                                                                                                                                                                                                                                                                                                        @media (max-width: 500px) {
                                                                                                                                                                                                                                                                                                                                                                                              .ui-box {
                                                                                                                                                                                                                                                                                                                                                                                                      padding: 20px 25px;
                                                                                                                                                                                                                                                                                                                                                                                                            }

                                                                                                                                                                                                                                                                                                                                                                                                                  .ui-box h1 {
                                                                                                                                                                                                                                                                                                                                                                                                                          font-size: 1.5rem;
                                                                                                                                                                                                                                                                                                                                                                                                                                }

                                                                                                                                                                                                                                                                                                                                                                                                                                      .logo img {
                                                                                                                                                                                                                                                                                                                                                                                                                                              width: 140px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                                                                                                                                                                                                                        }
                                                                                                                                                                                                                                                                                                                                                                                                                                                          </style>
                                                                                                                                                                                                                                                                                                                                                                                                                                                          </head>

                                                                                                                                                                                                                                                                                                                                                                                                                                                          <body>

                                                                                                                                                                                                                                                                                                                                                                                                                                                            <!-- Logo image above UI -->
                                                                                                                                                                                                                                                                                                                                                                                                                                                              <div class="logo">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                  <img src="IMG_20260127_151841-removebg-preview.png" alt="Logo">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                      <!-- UI Box -->
                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <div class="ui-box">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <h1>Loyal SMP Supporter</h1>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <p>Welcome to the official page</p>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <a href="https://discord.gg/9vZwAPyTzE" class="button">Join Discord</a>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      </body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      </html>
