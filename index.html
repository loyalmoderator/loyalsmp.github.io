<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Loyal SMP Supporter</title>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
          <style>
              * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
                  body { background: #000; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; }

                      .container {
                            background: #fff;
                                  color: #000;
                                        padding: 40px;
                                              border-radius: 20px;
                                                    width: 90%;
                                                          max-width: 450px;
                                                                text-align: center;
                                                                      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
                                                                          }

                                                                              /* IMAGE ON TOP */
                                                                                  .logo {
                                                                                        margin-bottom: 20px;
                                                                                            }
                                                                                                .logo img {
                                                                                                      width: 150px;
                                                                                                            border-radius: 15px;
                                                                                                                }

                                                                                                                    .discord-icon {
                                                                                                                          width: 50px;
                                                                                                                                margin-bottom: 15px;
                                                                                                                                      cursor: pointer;
                                                                                                                                            transition: transform 0.2s ease;
                                                                                                                                                }
                                                                                                                                                    .discord-icon:hover {
                                                                                                                                                          transform: scale(1.1);
                                                                                                                                                              }

                                                                                                                                                                  h1 { font-size: 28px; margin-bottom: 15px; color: #000; }
                                                                                                                                                                      p { font-size: 14px; color: #555; margin-bottom: 25px; }

                                                                                                                                                                          input {
                                                                                                                                                                                width: 100%;
                                                                                                                                                                                      padding: 12px 15px;
                                                                                                                                                                                            border-radius: 10px;
                                                                                                                                                                                                  border: 1px solid #000;
                                                                                                                                                                                                        margin-bottom: 20px;
                                                                                                                                                                                                              outline: none;
                                                                                                                                                                                                                    font-size: 14px;
                                                                                                                                                                                                                          background: #fff;
                                                                                                                                                                                                                                color: #000;
                                                                                                                                                                                                                                    }

                                                                                                                                                                                                                                        button {
                                                                                                                                                                                                                                              width: 100%;
                                                                                                                                                                                                                                                    padding: 15px;
                                                                                                                                                                                                                                                          border: 1px solid #000;
                                                                                                                                                                                                                                                                border-radius: 12px;
                                                                                                                                                                                                                                                                      background: #000;
                                                                                                                                                                                                                                                                            color: #fff;
                                                                                                                                                                                                                                                                                  font-size: 16px;
                                                                                                                                                                                                                                                                                        font-weight: 600;
                                                                                                                                                                                                                                                                                              cursor: pointer;
                                                                                                                                                                                                                                                                                                    transition: background 0.3s ease, color 0.3s ease;
                                                                                                                                                                                                                                                                                                        }
                                                                                                                                                                                                                                                                                                            button:hover { background: #fff; color: #000; }

                                                                                                                                                                                                                                                                                                                .note {
                                                                                                                                                                                                                                                                                                                      margin-top: 20px;
                                                                                                                                                                                                                                                                                                                            font-size: 12px;
                                                                                                                                                                                                                                                                                                                                  color: #555;
                                                                                                                                                                                                                                                                                                                                      }

                                                                                                                                                                                                                                                                                                                                          @media (max-width: 500px) {
                                                                                                                                                                                                                                                                                                                                                .container { padding: 30px; }
                                                                                                                                                                                                                                                                                                                                                      h1 { font-size: 24px; }
                                                                                                                                                                                                                                                                                                                                                          }
                                                                                                                                                                                                                                                                                                                                                            </style>
                                                                                                                                                                                                                                                                                                                                                            </head>
                                                                                                                                                                                                                                                                                                                                                            <body>
                                                                                                                                                                                                                                                                                                                                                              <div class="container">

                                                                                                                                                                                                                                                                                                                                                                  <!-- LOGO IMAGE ON TOP -->
                                                                                                                                                                                                                                                                                                                                                                      <div class="logo">
                                                                                                                                                                                                                                                                                                                                                                            <img src="IMG_20260127_151841-removebg-preview.png" alt="Logo">
                                                                                                                                                                                                                                                                                                                                                                                </div>

                                                                                                                                                                                                                                                                                                                                                                                    <!-- Discord Icon -->
                                                                                                                                                                                                                                                                                                                                                                                        <a href="https://discord.gg/9vZwAPyTzE" target="_blank">
                                                                                                                                                                                                                                                                                                                                                                                              <img class="discord-icon" src="https://cdn-icons-png.flaticon.com/512/2111/2111370.png" alt="Discord">
                                                                                                                                                                                                                                                                                                                                                                                                  </a>

                                                                                                                                                                                                                                                                                                                                                                                                      <h1>Loyal SMP Supporter</h1>
                                                                                                                                                                                                                                                                                                                                                                                                          <p>Enter your Discord username below to proceed to payment.</p>

                                                                                                                                                                                                                                                                                                                                                                                                              <input type="text" id="discord" placeholder="Discord username">
                                                                                                                                                                                                                                                                                                                                                                                                                  <button onclick="payNow()">Pay Now</button>

                                                                                                                                                                                                                                                                                                                                                                                                                      <div class="note">After payment, your Discord role will be assigned automatically.</div>
                                                                                                                                                                                                                                                                                                                                                                                                                        </div>

                                                                                                                                                                                                                                                                                                                                                                                                                          <script>
                                                                                                                                                                                                                                                                                                                                                                                                                              function payNow() {
                                                                                                                                                                                                                                                                                                                                                                                                                                    const username = document.getElementById("discord").value;
                                                                                                                                                                                                                                                                                                                                                                                                                                          if (!username) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                  alert("Please enter your Discord username!");
                                                                                                                                                                                                                                                                                                                                                                                                                                                          return;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                      window.location.href = "https://discord-bot-helper--loyalmoderatorb.replit.app/create-checkout?user=" + encodeURIComponent(username);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                          }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </html>
