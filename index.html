<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Loyal SMP Socials</title>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
          <style>
              * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
                  body { background: #000; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; }

                      .container {
                            background: #fff;
                                  color: #000;
                                        padding: 40px;
                                              border-radius: 20px;
                                                    width: 90%;
                                                          max-width: 450px;
                                                                text-align: center;
                                                                      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
                                                                          }

                                                                              .social-icon {
                                                                                    width: 50px;
                                                                                          margin: 10px;
                                                                                                cursor: pointer;
                                                                                                      transition: transform 0.2s ease;
                                                                                                          }
                                                                                                              .social-icon:hover {
                                                                                                                    transform: scale(1.1);
                                                                                                                        }

                                                                                                                            h1 { font-size: 28px; margin-bottom: 20px; color: #000; }
                                                                                                                                p { font-size: 14px; color: #555; margin-bottom: 25px; }

                                                                                                                                    @media (max-width: 500px) {
                                                                                                                                          .container { padding: 30px; }
                                                                                                                                                h1 { font-size: 24px; }
                                                                                                                                                    }
                                                                                                                                                      </style>
                                                                                                                                                      </head>
                                                                                                                                                      <body>
                                                                                                                                                        <div class="container">

                                                                                                                                                            <h1>Loyal SMP Supporter</h1>
                                                                                                                                                                <p>Follow us on our socials!</p>

                                                                                                                                                                    <!-- Social Links -->
                                                                                                                                                                        <div>
                                                                                                                                                                              <a href="https://discord.gg/a8xMq2jxrW" target="_blank">
                                                                                                                                                                                      <img class="social-icon" src="https://cdn-icons-png.flaticon.com/512/2111/2111370.png" alt="Discord">
                                                                                                                                                                                            </a>
                                                                                                                                                                                                  <a href="https://www.youtube.com/@TheLoyalSMP" target="_blank">
                                                                                                                                                                                                          <img class="social-icon" src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png" alt="YouTube">
                                                                                                                                                                                                                </a>
                                                                                                                                                                                                                    </div>

                                                                                                                                                                                                                      </div>
                                                                                                                                                                                                                      </body>
                                                                                                                                                                                                                      </html>
